name: Flipkart
services:
  mongodb:
    build: ./mongodb
    image: sudhakar20000/mongodb:v1
    container_name: mongodb
  catalogue:
    build: ./catalogue
    image: sudhakar20000/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  frontend:
    build: ./frontend
    image: sudhakar20000/frontend:v1
    container_name: frontend
    ports:
      - "80:80" 
    depends_on:
      - mongodb
      - catalogue
      - redis
      - user
  redis:
    build: ./redis
    image: sudhakar20000/redis:v1
    container_name: redis
  user:
    build: ./user
    image: sudhakar20000/user:v1
    container_name: user
    depends_on:
      - redis
      - catalogue
  cart:
    build: ./cart
    image: sudhakar20000/cart:v1
    container_name: cart
    environment:
      REDIS_HOST: redis
      CATALOGUE_HOST: catalogue
      CATALOGUE_PORT: 8080
    depends_on:
      - redis
      - catalogue
      
networks:
  default:
    name: flipkart
    driver: bridge
    external: false

  